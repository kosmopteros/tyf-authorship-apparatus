name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Documentation-honesty check
        run: python scripts/tyf.py check
      - name: Helper smoke tests
        run: python tests/test_tyf.py

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip install exposes the tyf console script
        run: pip install .
      - name: tyf check via the installed entry point
        run: TYF_PACK_ROOT="$PWD" tyf check
